name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'protection-valley/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: protection-valley/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps
        working-directory: protection-valley

      - name: Build
        run: npm run build
        working-directory: protection-valley

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: protection-valley/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
